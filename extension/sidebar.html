<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Roboto,sans-serif;
  background:#f5efe6;color:#2c2018;width:100%;height:100vh;overflow:hidden;font-size:15px;
  display:flex;flex-direction:column}

/* ── 顶栏 ── */
.header{padding:11px 16px;border-bottom:2px solid #e0c89a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#fffaf3}
.header h2{font-size:16px;color:#1e1408;font-weight:700;letter-spacing:.3px}
.hbtn{font-size:13px;padding:4px 11px;border-radius:5px;border:1px solid #d4b880;color:#7a5830;cursor:pointer;background:transparent;transition:all .15s}
.hbtn:hover{border-color:#c07808;color:#c07808}

/* ── 视频信息 ── */
.video-info{padding:10px 16px;border-bottom:1px solid #e0cca8;background:#fffaf3;flex-shrink:0}
.vi-title{font-size:15px;font-weight:600;color:#1e1408;margin-bottom:4px;line-height:1.4}
.vi-meta{font-size:13px;color:#9a7858}
.vi-status{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.vi-badge{font-size:12px;padding:2px 8px;border-radius:4px;border:1px solid transparent}
.vi-badge.ok{background:#e8f5ec;color:#3a8040;border-color:#b8dcbe}
.vi-badge.warn{background:#fef5e0;color:#a07010;border-color:#e8d080}
.vi-badge.off{background:#f0ebe4;color:#a08868;border-color:#ddd0b8}
.vi-balance{font-size:12px;color:#a08060;margin-left:auto}
.vi-gen-btn{font-size:12px;padding:2px 10px;border-radius:4px;border:1px solid #d4b880;background:#fdf4e3;color:#c07808;cursor:pointer;line-height:1.6;transition:background .15s}
.vi-gen-btn:hover:not(:disabled){background:#f5e8cc;border-color:#c07808}
.vi-gen-btn:disabled{opacity:.4;cursor:default}

/* ── 控制栏 ── */
.ctrl-bar{display:flex;gap:8px;padding:6px 16px;border-bottom:1px solid #e0cca8;align-items:center;flex-shrink:0;background:#fdf6eb}
.ctrl-bar:last-of-type{border-bottom:1px solid #e0cca8}
.ctrl-bar label{font-size:13px;color:#7a6040;display:flex;align-items:center;gap:3px;cursor:pointer;user-select:none}
.ctrl-bar select{padding:3px 7px;border-radius:5px;border:1px solid #d4b880;background:#fffaf3;color:#4a3820;font-size:12px;outline:none}
.ctrl-sep{flex:1}
/* 行1: 厂家锁定标签 + 模型下拉 */
.prov-label{font-size:12px;color:#a08060;white-space:nowrap;padding:0 2px;border-right:1px solid #e0cca8;padding-right:8px;margin-right:2px}
#model-sel{flex:1;max-width:160px}
#custom-model-input{padding:3px 8px;border-radius:5px;border:1px solid #d4b880;background:#fffaf3;color:#4a3820;font-size:12px;width:90px;outline:none}

/* ── ASR 队列状态栏 ── */
.asr-queue-bar{padding:5px 16px;background:#fdf6eb;border-bottom:1px solid #e0cca8;font-size:12px;color:#9a7858;flex-shrink:0}

/* ── 历史对话栏 ── */
.history-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid #e0cca8;background:#fdf6eb;flex-shrink:0}
.history-label{font-size:12px;color:#9a7858;flex:1}
.history-load-btn{font-size:12px;padding:2px 10px;border-radius:4px;border:1px solid #d4b880;background:#fdf4e3;color:#c07808;cursor:pointer;transition:background .15s}
.history-load-btn:hover{background:#f5e8cc;border-color:#c07808}

/* ── 消息区 ── */
.msgs-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;min-height:0;background:#f5efe6}
.msgs-area::-webkit-scrollbar{width:4px}
.msgs-area::-webkit-scrollbar-track{background:transparent}
.msgs-area::-webkit-scrollbar-thumb{background:#d4b880;border-radius:2px}
.msg{padding:11px 14px;border-radius:10px;font-size:16px;line-height:1.8;max-width:94%;white-space:pre-wrap;word-break:break-word}
.msg.u{background:#fde8c0;color:#2c1808;align-self:flex-end;border-bottom-right-radius:3px;border:1px solid #e8c880}
.msg.b{background:#fffaf3;color:#3a2c18;align-self:flex-start;border:1px solid #e0cca8;border-bottom-left-radius:3px}
.msg.b.ld{color:#b09070;font-style:italic}
.msg.b.summ-msg{border-color:#c07808;background:#fffdf5;border-left-width:3px}
.msg-label{font-size:11px;color:#c07808;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.retry-btn{margin-left:8px;cursor:pointer;color:#c07808;font-size:13px;text-decoration:underline;white-space:nowrap}
.retry-btn:hover{color:#a06006}

/* ── 进度条 ── */
.pb-area{flex-shrink:0;padding:0 16px 8px;display:none;background:#f5efe6}
.pb-label{font-size:13px;color:#9a8060;margin-bottom:5px}
.pb-bg{height:4px;background:#ede0c0;border-radius:2px;overflow:hidden}
.pb-fill{height:100%;background:#c07808;border-radius:2px;width:0%;transition:width 0.4s ease}

/* ── 输入区 ── */
.input-area{display:flex;flex-direction:column;gap:8px;padding:10px 16px 14px;border-top:1px solid #e0cca8;flex-shrink:0;background:#fffaf3}
.input-row textarea{width:100%;padding:10px 12px;border-radius:7px;border:1px solid #d4b880;background:#fdf4e3;color:#2c2018;font-size:15px;outline:none;resize:none;height:44px;font-family:inherit;transition:border-color .15s;line-height:1.5}
.input-row textarea:focus{border-color:#c07808;box-shadow:0 0 0 2px rgba(192,120,8,.1)}
.input-row textarea:disabled{opacity:.4;cursor:default}
.input-row textarea::placeholder{color:#c0a880}
.btn-row{display:flex;gap:8px}
.btn-row button{flex:1;padding:10px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-summ{background:#fdf0d8;color:#c07808;border:1px solid #e0c080}
.btn-summ:hover:not(:disabled){background:#f5e4c0}
.btn-send{background:#c07808;color:#fff;font-weight:700}
.btn-send:hover:not(:disabled){background:#a86606}
.btn-row button:disabled{cursor:default !important}
.btn-row button.btn-faded{background:#ede4d4 !important;color:#c0a880 !important;border-color:#ddd0b8 !important;opacity:1 !important}
.btn-row button.btn-working{opacity:0.75 !important}

/* ── 结构化总结 ── */
.summ-section{margin-bottom:10px}
.summ-section:last-child{margin-bottom:0}
.summ-sec-title{font-size:11px;color:#c07808;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.summ-sec-body{font-size:15px;color:#3a2c18;line-height:1.75}
.summ-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:3px}
.summ-list li{padding-left:14px;position:relative;font-size:15px;color:#3a2c18;line-height:1.7}
.summ-list li::before{content:'•';position:absolute;left:0;color:#c07808}
.summ-ganghuo{display:flex;flex-direction:column;gap:5px}
.summ-gh-item{display:flex;gap:7px;align-items:flex-start}
.summ-gh-type{font-size:11px;padding:1px 6px;border-radius:3px;background:#fde8c0;color:#a06010;border:1px solid #e8c880;white-space:nowrap;flex-shrink:0;margin-top:3px}
.summ-gh-text{font-size:15px;color:#3a2c18;line-height:1.7}
.summ-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.summ-tag{font-size:12px;padding:2px 9px;border-radius:10px;background:#f0e8d8;color:#7a5830;border:1px solid #d4b880}

/* ── streaming 光标 ── */
.msg.b.streaming::after{content:'▋';animation:cur-blink .9s step-end infinite;color:#c07808;margin-left:1px}
@keyframes cur-blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── 思考过程块 ── */
.thinking-wrap{border-left:3px solid #e0c890;padding:4px 0 4px 10px;margin-bottom:7px}
.thinking-hdr{font-size:12px;color:#a08858;cursor:pointer;user-select:none;display:flex;align-items:center}
.thinking-hdr:hover{color:#806838}
.thinking-body{font-size:13px;color:#b09878;font-style:italic;line-height:1.6;margin-top:4px;max-height:140px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.thinking-body.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <h2>BiliTracker</h2>
  <div class="hbtn" id="btn-dashboard">面板</div>
</div>

<div class="video-info" id="video-info">
  <div class="vi-title" id="vi-title">检测视频中...</div>
  <div class="vi-meta" id="vi-meta"></div>
  <div class="vi-status">
    <span class="vi-badge off" id="vi-server">Server</span>
    <span class="vi-badge off" id="vi-sub">字幕</span>
    <button class="vi-gen-btn" id="btn-gen-sub" style="display:none">生成字幕</button>
    <span class="vi-balance" id="vi-balance"></span>
  </div>
</div>

<!-- 行1: 厂家（锁定）+ 模型下拉 -->
<div class="ctrl-bar" id="ctrl-bar-model">
  <span class="prov-label" id="prov-label">DeepSeek</span>
  <select id="model-sel" title="选择模型"></select>
  <input type="text" id="custom-model-input" placeholder="自定义模型" title="自定义模型 ID" style="display:none">
</div>
<!-- 行2: 语音模型 + 数据 + 联网 -->
<div class="ctrl-bar">
  <span style="font-size:12px;color:#a08060;white-space:nowrap">语音转写</span>
  <select id="whisper-model">
    <option value="large-v3-turbo" selected>turbo（推荐）</option>
    <option value="large-v3">large-v3</option>
    <option value="small">small</option>
  </select>
  <div class="ctrl-sep"></div>
  <label><input type="checkbox" id="c-stats" checked> 数据</label>
  <label><input type="checkbox" id="c-websearch"> 联网</label>
</div>

<div class="asr-queue-bar" id="asr-queue-bar" style="display:none">
  <span id="asr-queue-text"></span>
</div>

<div class="history-bar" id="history-bar" style="display:none">
  <span class="history-label" id="history-label"></span>
  <button class="history-load-btn" id="history-load-btn">加载</button>
</div>

<div class="msgs-area" id="c-msgs"></div>

<div class="pb-area" id="pb-area">
  <div class="pb-label" id="pb-label"></div>
  <div class="pb-bg"><div class="pb-fill" id="pb-fill"></div></div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="c-input" placeholder="输入问题... Enter 发送，Shift+Enter 换行"></textarea>
  </div>
  <div class="btn-row">
    <button class="btn-summ" id="summ-btn">生成总结</button>
    <button class="btn-send" id="c-send">发送</button>
  </div>
</div>

<script src="sidebar.js"></script>
</body>
</html>
